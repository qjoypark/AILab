server:
  port: 8080

spring:
  application:
    name: lab-gateway
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        fail-fast: ${NACOS_DISCOVERY_FAIL_FAST:false}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        file-extension: yml
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://lab-service-user
          predicates:
            - Path=/api/v1/auth/**,/api/v1/system/**
        - id: material-service
          uri: lb://lab-service-material
          predicates:
            - Path=/api/v1/materials/**,/api/v1/suppliers/**,/api/v1/material-categories/**,/api/v1/files/**
        - id: inventory-service
          uri: lb://lab-service-inventory
          predicates:
            - Path=/api/v1/inventory/**,/api/v1/alerts/**,/api/v1/reports/**,/api/v1/todo/**,/api/v1/notifications/**,/api/v1/hazardous/ledger/**
        - id: approval-service
          uri: lb://lab-service-approval
          predicates:
            - Path=/api/v1/applications/**,/api/v1/hazardous/**,/api/v1/lab-rooms/**,/api/v1/lab-usage-applications/**
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms

logging:
  level:
    com.lab: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
