spring:
  application:
    name: lab-service-inventory-test
  cloud:
    discovery:
      enabled: false
    loadbalancer:
      enabled: false
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  config:
    import: "optional:nacos:"
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: embedded
      schema-locations: classpath:schema.sql
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      repositories:
        enabled: false
  redis:
    host: localhost
    port: 6379

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.lab: debug

# 禁用 Feign 客户端
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
